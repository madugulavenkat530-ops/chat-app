<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrivateChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f13;
    --surface:  #1a1a24;
    --border:   #2a2a3a;
    --accent:   #7c6dfa;
    --accent2:  #a78bfa;
    --online:   #34d399;

    --text:     #e8e8f0;
    --muted:    #6b6b8a;
    --bubble-me:   #7c6dfa;

  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);

    display: flex;

    gap: 32px;
    animation: fadeIn .4s ease;
  }
  .brand {

  }
  .brand h1 {

    font-weight: 700;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

  }
  .brand p { color: var(--muted); margin-top: 6px; font-size: .95rem; }

  .login-card {
    background: var(--surface);

    display: flex;

  }
  .login-card label { font-size: .8rem; font-weight: 600; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
  .login-card input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);

    padding: 13px;
    background: var(--accent);
    color: #fff;

    border-radius: 10px;

    cursor: pointer;

  .login-card button:hover { opacity: .88; }
  .login-card button:active { transform: scale(.98); }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    width: 820px;
    height: 92vh;
    max-height: 700px;
    background: var(--surface);
    border: 1px solid var(--border);

    overflow: hidden;

  /* header */

    width: 42px; height: 42px;

    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem; color: #fff;
    flex-shrink: 0;

  .header-info { flex: 1; }
  .header-info .name { font-weight: 600; font-size: 1rem; }
  .header-info .status {
    font-size: .8rem; color: var(--muted);
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--offline); transition: background .4s;
  }
  .status-dot.online { background: var(--online); }
  .my-tag {
    font-size: .78rem; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px;
  }

  /* users sidebar strip */
  .online-strip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    font-size: .78rem; color: var(--muted);
    overflow-x: auto;
  }
  .online-strip span { font-weight: 600; color: var(--muted); margin-right: 4px; }
  .user-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);

    cursor: pointer; transition: border-color .2s;
  }
  .user-chip:hover { border-color: var(--accent); }
  .user-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--online); }

  /* messages area */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: slideUp .2s ease;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #ec4899, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .msg-row.me .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 60%; }
  .msg-row.me .bubble-wrap { align-items: flex-end; }

  .bubble-sender { font-size: .72rem; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: .92rem;
    line-height: 1.5;
    position: relative;
    word-break: break-word;
  }
  .msg-row.me .bubble {
    background: var(--bubble-me);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg-row:not(.me) .bubble {
    background: var(--bubble-them);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* reactions */
  .reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .reaction-badge {
    font-size: .8rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
    user-select: none;
  }
  .reaction-badge:hover { border-color: var(--accent); transform: scale(1.1); }

  /* emoji picker */
  .emoji-picker {
    display: none; position: absolute;
    bottom: calc(100% + 6px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    gap: 4px;
    flex-wrap: wrap;
    width: 180px;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .emoji-picker.open { display: flex; }
  .msg-row.me .emoji-picker { right: 0; }
  .emoji-picker button {
    background: none; border: none; font-size: 1.2rem;
    cursor: pointer; border-radius: 6px; padding: 4px;
    transition: background .15s;
  }
  .emoji-picker button:hover { background: var(--border); }

  .bubble-wrap { position: relative; }
  .react-btn {
    opacity: 0; position: absolute;
    top: 50%; transform: translateY(-50%);
    background: var(--bg); border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 3px 7px; font-size: .8rem; cursor: pointer;
    transition: opacity .15s;
  }
  .msg-row.me .react-btn { left: -38px; }
  .msg-row:not(.me) .react-btn { right: -38px; }
  .bubble-wrap:hover .react-btn { opacity: 1; }

  /* system msg */
  .sys-msg {
    text-align: center; font-size: .78rem;
    color: var(--muted); padding: 8px 0;
  }

  /* input bar */
  .chat-input {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  #msg-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: .95rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 44px; height: 44px;
    background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .2s, transform .1s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: .85; }
  #send-btn:active { transform: scale(.94); }

  /* to input */
  .to-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }
  .to-bar label { font-size: .8rem; color: var(--muted); font-weight: 600; }
  #to-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: .9rem; font-family: inherit;
  }
  #to-input::placeholder { color: var(--muted); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="brand">
    <h1>PrivateChat</h1>
    <p>Realtime 1-on-1 messaging</p>
  </div>
  <div class="login-card">
    <label for="username-input">Your username</label>
    <input id="username-input" type="text" placeholder="e.g. Pallavi" maxlength="20" autocomplete="off"/>
    <button onclick="joinChat()">Join Chat →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <!-- header -->
  <div class="chat-header">
    <div class="avatar" id="peer-avatar">?</div>
    <div class="header-info">
      <div class="name" id="peer-name">No one selected</div>
      <div class="status">
        <div class="status-dot" id="peer-dot"></div>
        <span id="peer-status">Select someone from the list above</span>
      </div>
    </div>
    <div class="my-tag" id="my-tag"></div>
  </div>

  <!-- online users strip -->
  <div class="online-strip">
    <span>Online:</span>
    <div id="users-list" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
  </div>

  <!-- to bar -->
  <div class="to-bar">
    <label>To:</label>
    <input id="to-input" type="text" placeholder="Type a username to message…" autocomplete="off"/>
  </div>

  <!-- messages -->
  <div id="messages"></div>

  <!-- emoji picker (global, moved by JS) -->
  <div id="global-emoji-picker" class="emoji-picker">
    <button>❤️</button><button>😂</button><button>😮</button>
    <button>👍</button><button>🔥</button><button>🎉</button>
    <button>😢</button><button>👀</button><button>💯</button><button>🚀</button>
  </div>

  <!-- input -->
  <div class="chat-input">
    <input id="msg-input" type="text" placeholder="Type a message…" autocomplete="off"/>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let ws, myUsername, toUser = '';
// messageId -> { element, reactions: {emoji: Set of usernames} }
const msgMap = {};
let activeMsgId = null;

function joinChat() {
  const val = document.getElementById('username-input').value.trim();
  if (!val) return;
  myUsername = val;
  document.getElementById('my-tag').textContent = '👤 ' + myUsername;

  ws = new WebSocket('web-production-17f3f.up.railway.app');

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', username: myUsername }));
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('msg-input').focus();
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'status_update') renderUsers(data.users);
    else if (data.type === 'message') receiveMessage(data);
    else if (data.type === 'reaction') receiveReaction(data);
  };

  ws.onclose = () => addSysMsg('Disconnected from server.');
}

function renderUsers(users) {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  users.forEach(u => {
    if (u === myUsername) return;
    const chip = document.createElement('div');
    chip.className = 'user-chip';
    chip.innerHTML = `<div class="dot"></div>${u}`;
    chip.onclick = () => selectUser(u);
    list.appendChild(chip);
  });
  // update peer status
  if (toUser) {
    const online = users.includes(toUser);
    document.getElementById('peer-dot').className = 'status-dot' + (online ? ' online' : '');
    document.getElementById('peer-status').textContent = online ? 'Online' : 'Offline';
  }
}

function selectUser(u) {
  toUser = u;
  document.getElementById('to-input').value = u;
  document.getElementById('peer-avatar').textContent = u[0].toUpperCase();
  document.getElementById('peer-name').textContent = u;
  document.getElementById('peer-dot').className = 'status-dot online';
  document.getElementById('peer-status').textContent = 'Online';
  document.getElementById('msg-input').focus();
}

document.getElementById('to-input').addEventListener('change', e => {
  toUser = e.target.value.trim();
  selectUser(toUser);
});

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !toUser) return;
  ws.send(JSON.stringify({ type: 'message', to: toUser, text }));
  addMessage({ id: Date.now()+'', from: myUsername, text }, true);
  input.value = '';
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function receiveMessage(data) {
  // only show if it's for us, or from toUser
  addMessage(data, false);
}

function addMessage(data, isMe) {
  const msgs = document.getElementById('messages');
  const id = data.id || Date.now()+'';

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');

  const avEl = document.createElement('div');
  avEl.className = 'msg-avatar';
  avEl.textContent = (isMe ? myUsername : data.from)[0].toUpperCase();

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const sender = document.createElement('div');
  sender.className = 'bubble-sender';
  sender.textContent = isMe ? 'You' : data.from;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = data.text;

  const reactBtn = document.createElement('button');
  reactBtn.className = 'react-btn';
  reactBtn.textContent = '😊';
  reactBtn.onclick = (e) => { e.stopPropagation(); openEmojiPicker(id, wrap, isMe); };

  const reactionsEl = document.createElement('div');
  reactionsEl.className = 'reactions';

  wrap.appendChild(sender);
  wrap.appendChild(bubble);
  wrap.appendChild(reactBtn);
  wrap.appendChild(reactionsEl);
  row.appendChild(avEl);
  row.appendChild(wrap);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;

  msgMap[id] = { element: reactionsEl, reactions: {}, isMe };
}

function addSysMsg(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

// Emoji picker
const picker = document.getElementById('global-emoji-picker');
picker.querySelectorAll('button').forEach(btn => {
  btn.onclick = () => {
    if (!activeMsgId) return;
    const emoji = btn.textContent;
    ws.send(JSON.stringify({ type: 'reaction', msgId: activeMsgId, emoji, to: toUser }));
    applyReaction(activeMsgId, emoji, myUsername);
    picker.classList.remove('open');
    activeMsgId = null;
  };
});

document.addEventListener('click', () => {
  picker.classList.remove('open');
  activeMsgId = null;
});

function openEmojiPicker(msgId, wrap, isMe) {
  activeMsgId = msgId;
  wrap.appendChild(picker);
  picker.style.left = isMe ? 'auto' : '0';
  picker.style.right = isMe ? '0' : 'auto';
  picker.classList.add('open');
}

function applyReaction(msgId, emoji, user) {
  if (!msgMap[msgId]) return;
  const { element, reactions } = msgMap[msgId];
  if (!reactions[emoji]) reactions[emoji] = new Set();
  reactions[emoji].add(user);
  renderReactions(msgId);
}

function renderReactions(msgId) {
  const { element, reactions } = msgMap[msgId];
  element.innerHTML = '';
  Object.entries(reactions).forEach(([emoji, users]) => {
    const badge = document.createElement('div');
    badge.className = 'reaction-badge';
    badge.textContent = emoji + ' ' + users.size;
    badge.title = [...users].join(', ');
    element.appendChild(badge);
  });
}

function receiveReaction(data) {
  applyReaction(data.msgId, data.emoji, data.from);
}
</script>
</body>
</html>
